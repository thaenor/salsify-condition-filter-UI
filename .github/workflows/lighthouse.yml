name: Lighthouse

on:
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run build
            - run: npx vite preview --port 4173 &
            - run: sleep 3
            - run: npx lhci autorun --collect.url=http://localhost:4173
            - run: rm -rf dist
            - run: npm run build -- --base /salsify-condition-filter-UI/
            - run: cp -r lighthouse-report dist/lighthouse
            - run: |
                  echo '<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>Lighthouse Report</title></head><body><h1>Lighthouse Report</h1><ul>' > dist/lighthouse/index.html
                  for f in dist/lighthouse/*.report.html; do
                      name=$(basename "$f")
                      echo "<li><a href=\"$name\">$name</a></li>" >> dist/lighthouse/index.html
                  done
                  echo '</ul></body></html>' >> dist/lighthouse/index.html
            - uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
                  publish_branch: gh-pages
